name: Self-test the blog actions

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Which self-test to run (each run costs real API tokens)"
        type: choice
        default: all
        options: [all, generate, optimize, pipeline]

permissions:
  contents: read

jobs:
  optimize-against-fixture:
    if: ${{ inputs.suite == 'all' || inputs.suite == 'optimize' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Build a minimal fixture blog
        run: |
          mkdir -p demo2/posts
          cp tests/fixtures/jekyll-post.md demo2/posts/desert-hikes.md
          # commit the fixture so the action sees a clean baseline (its change
          # detection assumes everything dirty was written by the agent)
          git add demo2
          git -c user.name=ci -c user.email=ci@test commit -m "test fixture" -q

      - name: Run the optimizer action against the fixture
        id: opt
        uses: ./optimize
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          working_directory: demo2
          post_file: posts/desert-hikes.md
          keyword: "desert hiking water"
          push_branch: "false"
          create_pr: "false"

      - name: Assert outputs
        working-directory: demo2
        run: |
          echo "changed: ${{ steps.opt.outputs.changed }}"
          test "${{ steps.opt.outputs.changed }}" = "true" || { echo "::error::optimizer reported no changes on a fixture with planted issues"; exit 1; }
          grep -q 'description:' posts/desert-hikes.md || { echo "::error::front-matter description was not added"; exit 1; }
          echo "✅ optimizer self-test passed"

  generate-against-fixture:
    if: ${{ inputs.suite == 'all' || inputs.suite == 'generate' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: action-self-test
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Build a minimal fixture blog
        run: |
          mkdir -p demo/posts
          cat > demo/blog_registry.py <<'EOF'
          """Demo blog registry.

          Adding a new post:
            1. Drop an HTML fragment (just the article body, no <html>/<head>) at posts/<slug>.html
            2. Append one metadata entry to POSTS below.
          """
          POSTS = [
              {
                  "slug": "first-post",
                  "title": "Why Shoulder-Season Road Trips Beat Summer Ones",
                  "date": "2026-06-01",
                  "excerpt": "Fewer crowds, easier bookings, better light.",
                  "meta_desc": "Shoulder-season road trips: fewer crowds, easier campground bookings, cooler driving.",
                  "minutes": 4,
              },
          ]
          EOF
          cat > demo/posts/first-post.html <<'EOF'
          <p class="lead">Everyone plans road trips for July. The trips I remember are all from late September: same roads, half the traffic, campgrounds you can book a week out instead of six months.</p>
          <h2 id="why">Why the shoulder season wins</h2>
          <p>Crowds thin out after Labor Day while most scenic roads stay open for weeks. Lodging prices drop, trailhead parking exists again, and the light gets better for photos.</p>
          <h2 id="tradeoffs">The tradeoffs</h2>
          <p>Days get shorter and high passes can close early with the first storm, so check road status the week you leave rather than trusting summer assumptions.</p>
          EOF
          # commit the fixture so the action sees a clean baseline (its change
          # detection and post_file discovery assume dirty files == agent output)
          git add demo
          git -c user.name=ci -c user.email=ci@test commit -m "test fixture" -q

      - name: Run the action against the fixture
        id: gen
        uses: ./
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          working_directory: demo
          push_branch: "false"
          create_pr: "false"

      - name: Assert outputs
        working-directory: demo
        run: |
          echo "post_file: ${{ steps.gen.outputs.post_file }}"
          test -n "${{ steps.gen.outputs.post_file }}" || { echo "::error::no post_file output"; exit 1; }
          git show HEAD --stat | head -20
          git show HEAD --name-only | grep -q "coverage" || { echo "::error::coverage ledger missing from commit"; exit 1; }
          python3 -c "import ast; ast.parse(open('blog_registry.py').read())"
          python3 - <<'EOF'
          import importlib.util
          spec = importlib.util.spec_from_file_location("reg", "blog_registry.py")
          m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m)
          assert len(m.POSTS) == 2, f"expected 2 registry entries, got {len(m.POSTS)}"
          print("registry OK:", [p["slug"] for p in m.POSTS])
          EOF
          echo "✅ self-test passed"

  pipeline-against-fixture:
    if: ${{ inputs.suite == 'all' || inputs.suite == 'pipeline' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Build a minimal fixture blog
        run: |
          mkdir -p demo3/posts
          cat > demo3/blog_registry.py <<'FIXEOF'
          """Demo blog registry.

          Adding a new post:
            1. Drop an HTML fragment (just the article body, no <html>/<head>) at posts/<slug>.html
            2. Append one metadata entry to POSTS below.
          """
          POSTS = [
              {
                  "slug": "first-post",
                  "title": "Why Shoulder-Season Road Trips Beat Summer Ones",
                  "date": "2026-06-01",
                  "excerpt": "Fewer crowds, easier bookings, better light.",
                  "meta_desc": "Shoulder-season road trips: fewer crowds, easier campground bookings, cooler driving.",
                  "minutes": 4,
              },
          ]
          FIXEOF
          cat > demo3/posts/first-post.html <<'FIXEOF'
          <p class="lead">Everyone plans road trips for July. The trips I remember are all from late September: same roads, half the traffic, campgrounds you can book a week out.</p>
          <h2 id="why">Why the shoulder season wins</h2>
          <p>Crowds thin out after Labor Day while most scenic roads stay open for weeks. Lodging prices drop and the light gets better for photos.</p>
          FIXEOF
          git add demo3
          git -c user.name=ci -c user.email=ci@test commit -m "test fixture" -q

      - name: Run the pipeline action against the fixture
        id: pipe
        uses: ./pipeline
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          working_directory: demo3
          push_branch: "false"
          create_pr: "false"

      - name: Assert outputs
        working-directory: demo3
        run: |
          test -n "${{ steps.pipe.outputs.post_file }}" || { echo "::error::no post_file output"; exit 1; }
          git show HEAD --name-only | grep -q "coverage" || { echo "::error::ledger missing from commit"; exit 1; }
          if find . -type d -name '.seo-optimizer' | grep -q .; then
            echo "::error::runner-only artifacts leaked into the tree"; exit 1
          fi
          python3 - <<'FIXEOF'
          import importlib.util
          spec = importlib.util.spec_from_file_location("reg", "blog_registry.py")
          m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m)
          assert len(m.POSTS) == 2, f"expected 2 registry entries, got {len(m.POSTS)}"
          print("registry OK:", [p["slug"] for p in m.POSTS])
          FIXEOF
          echo "✅ pipeline self-test passed"
